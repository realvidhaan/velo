name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # Velo needs the macOS 26 SDK (SpeechAnalyzer, FoundationModels).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        # Gated live tests (STT / LLM) stay off in CI; the deterministic suite runs.
        run: swift test
